name: Rayforce audit

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: rayforce-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  rayforce-audit:
    name: rayforce-audit
    if: github.event.pull_request.draft == false
    runs-on: [self-hosted, rayforce-audit, claude-code]
    timeout-minutes: 45

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Fetch base branch
        run: |
          git fetch --no-tags --prune origin \
            +refs/heads/${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}

      - name: Run Claude rayforce-audit skill
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RAYFORCE_AUDIT_PLUGIN_DIR: /home/hetoku/.claude/plugins/rayforce-audit-current
        run: |
          set -euo pipefail
          mkdir -p audit-output

          cat > audit-output/rayforce-audit-prompt.md <<EOF
          Use the rayforce-audit:rayforce-audit skill.

          Audit this RayforceDB/rayforce pull request as a required merge gate.

          Context:
          - PR number: ${PR_NUMBER}
          - Base ref: ${BASE_REF}
          - Head SHA: ${HEAD_SHA}
          - Diff command: git diff ${BASE_REF}...HEAD

          CI safety rules:
          - This is running on a self-hosted runner.
          - Do not modify files.
          - Do not run build scripts, tests, generated binaries, package managers, network fetches, or project code from the PR.
          - You may inspect repository files and run read-only git commands only.

          Review focus:
          - correctness and query execution semantics
          - optimizer behavior and rule rewrites
          - memory ownership/refcount/lifetime issues
          - C portability and undefined behavior risks
          - benchmark-specific hacks or vendor/product-specific assumptions
          - missing or misleading tests
          - performance-regression risk visible from the diff

          Output:
          - Write a concise Markdown audit report to stdout.
          - Include blocking findings first, each with file/path and concrete reasoning.
          - If there are no merge-blocking findings, say so clearly.
          - End with exactly one final verdict line:
            RAYFORCE_AUDIT_VERDICT: PASS
            or
            RAYFORCE_AUDIT_VERDICT: FAIL
          - Use FAIL only for issues that should block merge.
          EOF

          # Run Claude Code as the normal terminal UI, not `claude -p`.  A small
          # pty wrapper lets CI capture the terminal output and stop once the
          # required verdict line is emitted, instead of leaving Claude at the
          # interactive prompt after the audit is complete.
          python3 - <<'PY'
          import os
          import pty
          import re
          import select
          import signal
          import subprocess
          import sys
          import time
          from pathlib import Path

          prompt = Path("audit-output/rayforce-audit-prompt.md").read_text()
          raw_path = Path("audit-output/rayforce-audit.raw")
          md_path = Path("audit-output/rayforce-audit.md")
          ansi = re.compile(rb"\x1B(?:[@-Z\\-_]|\[[0-?]*[ -/]*[@-~])")
          verdict_re = re.compile(r"^RAYFORCE_AUDIT_VERDICT: (PASS|FAIL)$", re.M)

          argv = [
              "claude",
              prompt,
              "--plugin-dir",
              os.environ["RAYFORCE_AUDIT_PLUGIN_DIR"],
              "--permission-mode",
              "bypassPermissions",
              "--allowedTools",
              "Read,Glob,Grep,LS,Bash(git *)",
              "--ax-screen-reader",
          ]
          env = os.environ.copy()
          env.setdefault("TERM", "xterm-256color")
          env.setdefault("COLUMNS", "120")
          env.setdefault("LINES", "40")

          master, slave = pty.openpty()
          proc = subprocess.Popen(
              argv,
              stdin=slave,
              stdout=slave,
              stderr=slave,
              env=env,
              start_new_session=True,
          )
          os.close(slave)

          captured = bytearray()
          deadline = time.monotonic() + 40 * 60
          verdict = None
          child_status = None

          try:
              while True:
                  if time.monotonic() > deadline:
                      os.killpg(proc.pid, signal.SIGTERM)
                      child_status = 124
                      break

                  ready, _, _ = select.select([master], [], [], 1.0)
                  if ready:
                      try:
                          chunk = os.read(master, 8192)
                      except OSError:
                          chunk = b""
                      if chunk:
                          captured.extend(chunk)
                          sys.stdout.buffer.write(chunk)
                          sys.stdout.buffer.flush()
                          plain = ansi.sub(b"", bytes(captured)).replace(b"\r\n", b"\n").replace(b"\r", b"\n")
                          m = verdict_re.search(plain.decode(errors="replace"))
                          if m:
                              verdict = m.group(1)
                              os.killpg(proc.pid, signal.SIGTERM)
                              child_status = 0
                              break

                  poll = proc.poll()
                  if poll is not None:
                      child_status = poll
                      break
          finally:
              try:
                  os.close(master)
              except OSError:
                  pass
              if proc.poll() is None:
                  try:
                      os.killpg(proc.pid, signal.SIGKILL)
                  except ProcessLookupError:
                      pass
                  proc.wait(timeout=5)

          raw_path.write_bytes(captured)
          plain = ansi.sub(b"", bytes(captured)).replace(b"\r\n", b"\n").replace(b"\r", b"\n")
          md_path.write_text(plain.decode(errors="replace"))

          if verdict is None and child_status != 0:
              sys.exit(child_status)
          PY

          grep -q '^RAYFORCE_AUDIT_VERDICT: PASS$' audit-output/rayforce-audit.md

      - name: Comment audit failure on PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          report="audit-output/rayforce-audit.md"
          body="audit-output/rayforce-audit-comment.md"
          marker="<!-- rayforce-audit-failure-comment -->"

          {
            echo "$marker"
            echo "## Rayforce targeted audit failed"
            echo
            echo "This PR did not pass the required Rayforce audit gate. Fix the blocking findings below and push an update; the audit will rerun automatically."
            echo
            if [ -s "$report" ]; then
              sed -n '1,220p' "$report"
            else
              echo "The audit failed before producing a report. Open the required check logs for details."
            fi
          } > "$body"

          comment_id=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${marker}\")) | .id" \
            | tail -n 1)

          if [ -n "$comment_id" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${comment_id}" \
              -f body="$(cat "$body")" >/dev/null
          else
            gh api -X POST "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              -f body="$(cat "$body")" >/dev/null
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rayforce-audit-report
          path: audit-output/rayforce-audit.md
