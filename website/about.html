  <script>
    // Embedded promo: hide the dev playback bar. Keep the Stage's own scaling
    // (Math.min / contain) so nothing gets cropped — a few px of dark padding
    // at the edges is preferable to text being clipped out of view.
    //
    // Poll for the canvas instead of listening on iframe.load: the promo's
    // loader calls document.documentElement.replaceWith(...) after load has
    // already fired, which would discard anything we attached to the old
    // document. Canvas existence means React has mounted, so the final
    // document is stable and our attachments will survive.
    (function () {
      const iframe = document.querySelector('iframe.promo-frame');

      function attach() {
        const doc = iframe.contentDocument;
        if (!doc || !doc.documentElement) return false;
        if (!doc.querySelector('#root > div > div > div')) return false;

        const style = doc.createElement('style');
        style.textContent =
          '#root > div > div:last-child { display: none !important; }' +
          // Stage outer defaults to #0a0a0a. Matching the scenes' own
          // #04233b hides the tiny letterbox bars from contain-mode scaling.
          '#root > div { background: #04233b !important; }';
        doc.head.appendChild(style);
        return true;
      }

      let tries = 0;
      const iv = setInterval(function () {
        if (attach() || ++tries > 100) clearInterval(iv);
      }, 100);
    })();
  </script>
